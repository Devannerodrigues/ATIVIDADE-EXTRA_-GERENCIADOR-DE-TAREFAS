<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>

    <link rel="stylesheet" href="style.css">

    <script src="js/script.js"></script>
    
</head>
<body>
      <section id="formulario">

        <h2>Cadastro de Tarefas</h2>

        <form id="form-dados">

            <label for="responsavel">Responsável</label>
            <input type="text" id="responsavel" class="input01" placeholder="Digite aqui" required>

            <label for="tarefa">Tarefa</label>
            <input type="text" id="tarefa" class="input02" required>

            <label for="descricao tarefa">Descrição da tarefa</label>
            <input type="text" id="descricao tarefa" class="input02" required>

            <div class="prioridade">

            <label for="baixa">Baixa</label>
            <input type="text" id="baixa" class="input02" placeholder="informe">

            <label for="medio">Média</label>
            <input type="text" id="Média" class="input01">

            <label for="alta">Alta</label>
            <input type="text" id="alta" class="input02">

            <label for="data realizacao">Data de realização</label>
            <input type="date" id="data realizacao" class="input01">

            </div>

            <div class="cards">
                

            </div>

            <div id="div-btns">

                <button type="submit" id="btn-add">
                    Adicionar
                </button>

                <button type="reset" id="btn-limpar">
                    Limpar
                </button>

            </div>

        </form>

    </section>
</body>
</html>
